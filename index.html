<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Gombe State University — Open Source Project</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ============================================================
       MEMBER 1 — Hero Banner (Heading + Tagline)
       ============================================================ -->
  <header id="hero">
    <div class="hero-content">
      <h1 id="university-name"><!-- Member 1 adds university name here --></h1>
      <p id="tagline"><!-- Member 1 adds tagline here --></p>
    </div>
  </header>

  <!-- ============================================================
       MEMBER 2 — Navigation Bar
       ============================================================ -->
  <nav id="navbar">
    <!-- Member 2 adds nav links here -->
  </nav>

  <!-- ============================================================
       MEMBER 3 — About Section Title + Paragraph
       ============================================================ -->
  <section id="about">
    <h2><!-- Member 3 adds section title --></h2>
    <p><!-- Member 3 adds about paragraph --></p>
  </section>

  <!-- ============================================================
       MEMBER 4 — Programmes / Courses List
       ============================================================ -->
  <section id="programmes">
    <h2>Our Programmes</h2>
    <ul id="courses-list">
      <!-- Member 4 adds list items here -->
    </ul>
  </section>

  <!-- ============================================================
       MEMBER 5 — Admission Requirements Section
       ============================================================ -->
  <section id="admission">
    <h2>Admission Requirements</h2>
    <!-- Member 5 adds a paragraph here -->
  </section>

  <!-- ============================================================
       MEMBER 6 — Stats / Numbers Section (Students, Staff, etc.)
       ============================================================ -->
  <section id="stats">
    <!-- Member 6 adds stat boxes here -->
  </section>

  <!-- ============================================================
       MEMBER 7 — News & Announcements Section
       ============================================================ -->
  <section id="news">
    <h2>News & Announcements</h2>
    <!-- Member 7 adds news items here -->
  </section>

  <!-- ============================================================
       MEMBER 8 — Events Section
       ============================================================ -->
  <section id="events">
    <h2>Upcoming Events</h2>
    <!-- Member 8 adds event cards here -->
  </section>

  <!-- ============================================================
       MEMBER 9 — Gallery Section (image placeholders)
       ============================================================ -->
  <section id="gallery">
    <h2>Gallery</h2>
    <div id="gallery-grid">
      <!-- Member 9 adds image elements here -->
    </div>
  </section>

  <!-- ============================================================
       MEMBER 10 — Testimonials / Student Quotes Section
       ============================================================ -->
  <section id="testimonials">
    <h2>What Our Students Say</h2>
    <!-- Member 10 adds blockquote elements here -->
  </section>

  <!-- ============================================================
       MEMBER 11 — Faculty / Department Cards
       ============================================================ -->
  <section id="faculties">
    <h2>Our Faculties</h2>
    <div id="faculty-cards">
      <!-- Member 11 adds faculty cards here -->
    </div>
  </section>

  <!-- ============================================================
       MEMBER 12 — Contact Information Section
       ============================================================ -->
  <section id="contact">
    <h2>Contact Us</h2>
    <!-- Member 12 adds address, phone, email here -->
  </section>

  <!-- ============================================================
       MEMBER 13 — Social Media Links
       ============================================================ -->
  <div id="social-links">
    <!-- Member 13 adds social links here -->
  </div>

  <!-- ============================================================
       MEMBER 14 — Apply Now Button
       ============================================================ -->
  <div id="apply-section">
    <!-- Member 14 adds the Apply Now button here -->
  </div>

  <!-- ============================================================
       MEMBER 15 — Search Bar
       ============================================================ -->
  <div id="search-bar">
    <!-- Member 15 adds search input and button here -->
  </div>

  <!-- ============================================================
       MEMBER 16 — Dark Mode Toggle Button
       ============================================================ -->
  <div id="theme-toggle">
    <!-- Member 16 adds toggle button here -->
  </div>

  <!-- ============================================================
       MEMBER 17 — Back to Top Button
       ============================================================ -->
  <!-- Member 17 adds a back-to-top button here -->

  <!-- ============================================================
       MEMBER 18 — Footer
       ============================================================ -->
  <footer id="footer">
    <!-- Member 18 adds footer content here -->
  </footer>

  <script src="app.js"></script>

</html>
